<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LUXE VIP Store</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    #loading { position: absolute; top: 50%; left: 50%; color: gold; font-size: 24px; transform: translate(-50%, -50%); z-index: 1000; }
    #levelDisplay { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.85); color: gold; padding: 12px 20px; border-radius: 12px; font-size: 17px; border: 2px solid gold; z-index: 200; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 300; }
  </style>
</head>
<body>
  <div id="loading">Loading Real G-Wagon & Store...</div>
  <div id="levelDisplay">VIP LEVEL <span id="level">1</span></div>

  <!-- Keypad -->
  <div id="keypadOverlay" class="overlay">
    <div style="background:#111; color:white; padding:40px; border-radius:20px; text-align:center; box-shadow:0 0 60px gold;">
      <h2>🔐 VIP ENTRANCE</h2>
      <p>Enter Access Code</p>
      <input id="keyInput" type="text" maxlength="4" style="font-size:34px; width:200px; text-align:center; padding:12px; background:#222; border:2px solid gold; color:white;">
      <br><br>
      <button onclick="submitCode()" style="padding:16px 50px; font-size:18px; background:#c00; color:white; border:none; border-radius:10px;">UNLOCK DOOR</button>
      <div id="status" style="color:#ff4444; margin-top:20px; font-weight:bold;"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    let scene, camera, renderer, controls, doorMesh;
    let vipLevel = 1;
    let productsAdded = 0;
    let phase = 'intro';

    function updateLevel() {
      document.getElementById('level').textContent = vipLevel;
    }

    function init() {
      document.getElementById('loading').style.display = 'none';
      updateLevel();

      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x111111, 30, 180);

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 250);
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 1.4));
      const sun = new THREE.DirectionalLight(0xffffff, 2.4);
      sun.position.set(30, 50, 40);
      scene.add(sun);

      // Ground + Red Carpet
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(300,300), new THREE.MeshStandardMaterial({color: 0x222222}));
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      const carpet = new THREE.Mesh(new THREE.PlaneGeometry(9, 52), new THREE.MeshStandardMaterial({color: 0xcc0000}));
      carpet.rotation.x = -Math.PI / 2;
      carpet.position.set(0, 0.1, 26);
      scene.add(carpet);

      // Real G-Wagons
      const loader = new THREE.GLTFLoader();
      loader.load('g63.glb', (gltf) => {
        const car1 = gltf.scene.clone();
        car1.position.set(-16, 0, -32);
        car1.scale.set(2.2, 2.2, 2.2);
        car1.rotation.y = Math.PI / 2;
        scene.add(car1);

        const car2 = gltf.scene.clone();
        car2.position.set(16, 0, -32);
        car2.scale.set(2.2, 2.2, 2.2);
        car2.rotation.y = Math.PI / 2;
        scene.add(car2);
      });

      // Stairs
      const stairs = new THREE.Mesh(new THREE.BoxGeometry(16, 1.5, 45), new THREE.MeshStandardMaterial({color: 0x444444}));
      stairs.position.set(0, 8, 20);
      stairs.rotation.x = -0.22;
      scene.add(stairs);

      // Massive Store Walls
      const wallMat = new THREE.MeshStandardMaterial({color: 0x1a1a1a});
      const leftWall = new THREE.Mesh(new THREE.BoxGeometry(3, 25, 70), wallMat);
      leftWall.position.set(-18, 15, 45);
      scene.add(leftWall);
      const rightWall = leftWall.clone();
      rightWall.position.x = 18;
      scene.add(rightWall);

      // Door
      doorMesh = new THREE.Mesh(new THREE.BoxGeometry(8, 14, 1), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.95}));
      doorMesh.position.set(0, 10, 12);
      scene.add(doorMesh);

      camera.position.set(0, 8, -45);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      startCinematic();
      animate();
    }

    function startCinematic() {
      let progress = 0;
      const startTime = Date.now();
      function move() {
        progress = Math.min((Date.now() - startTime) / 14000, 1);
        if (progress < 0.4) {
          camera.position.z = -45 + progress * 40;
        } else if (progress < 0.7) {
          camera.position.set(0, 12, -20 + (progress-0.4)*55);
        } else {
          camera.position.set(4, 16, 15);
          camera.lookAt(0, 11, 20);
        }
        if (progress < 1) requestAnimationFrame(move);
        else document.getElementById('keypadOverlay').style.display = 'flex';
      }
      move();
    }

    window.submitCode = function() {
      const code = document.getElementById('keyInput').value.trim();
      const status = document.getElementById('status');
      if (code === "2000") {
        status.style.color = "#00ff88";
        status.textContent = "ACCESS GRANTED";
        setTimeout(() => {
          document.getElementById('keypadOverlay').style.display = 'none';
          doorMesh.position.x = -6;
          setTimeout(() => doorMesh.position.x = 6, 1200);
          phase = 'inside';
        }, 800);
      } else {
        status.textContent = "CHECK ON INSTAGRAM";
        setTimeout(() => status.textContent = "", 2200);
      }
    };

    function animate() {
      requestAnimationFrame(animate);
      if (controls) controls.update();
      renderer.render(scene, camera);
    }

    // Click products to add & level up
    window.addEventListener('click', (e) => {
      if (phase !== 'inside') return;
      const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(scene.children, true);
      if (hits.length > 0) {
        productsAdded++;
        if (productsAdded % 2 === 0 && vipLevel < 10) {
          vipLevel++;
          updateLevel();
          alert(`🎉 Congratulations! You are now VIP Level ${vipLevel}`);
        } else {
          alert("Added to your VIP Wishlist ✨");
        }
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
