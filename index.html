<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LUXE VIP 3D Store</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    canvas { display: block; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; align-items: center; justify-content: center; z-index: 300; }
    .passcode, .keypadOverlay, .success { background: rgba(0,0,0,0.93); color: #fff; padding: 35px; border-radius: 16px; text-align: center; pointer-events: all; box-shadow: 0 0 50px rgba(255,215,0,0.6); }
    input { font-size: 28px; padding: 12px; width: 200px; text-align: center; margin: 15px 0; letter-spacing: 8px; }
    button { padding: 14px 32px; font-size: 17px; background: #c00; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
    .cart { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.85); color: gold; padding: 14px 26px; border-radius: 12px; font-size: 17px; }
    .info-box { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 10px; max-width: 300px; display: none; }
    .keypad-status { color: #ff4444; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <!-- Passcode (initial) -->
  <div id="passcodeOverlay" class="overlay" style="display: none;">
    <div class="passcode">
      <h2>VIP ACCESS</h2>
      <input type="text" id="codeInput" maxlength="6" placeholder="Enter Code">
      <br><button onclick="checkCode()">ENTER THE LUXE STORE</button>
    </div>
  </div>

  <!-- Keypad Input -->
  <div id="keypadOverlay" class="overlay">
    <div class="keypadOverlay">
      <h2>🔐 VIP KEYPAD</h2>
      <input type="text" id="keypadInput" maxlength="4" placeholder="2000">
      <br><button onclick="submitKeypad()">UNLOCK</button>
      <div id="keypadStatus" class="keypad-status"></div>
    </div>
  </div>

  <!-- Product Info -->
  <div id="infoBox" class="info-box"></div>

  <!-- Cart -->
  <div id="cart" class="cart" style="display: none;">
    Wishlist: <span id="cartCount">0</span>
    <button onclick="showPayment()" style="margin-left:15px; background:#ffd700; color:#000; padding:8px 18px;">Checkout VIP</button>
  </div>

  <!-- Payment & Success same as before -->
  <div id="paymentOverlay" class="overlay">
    <div class="payment" style="background: rgba(0,0,0,0.93);">
      <h2>Exclusive VIP Checkout</h2>
      <div id="cardAnimation" style="width: 340px; height: 210px; background: linear-gradient(135deg, #1a1a1a, #000); border: 5px solid gold; border-radius: 15px; margin: 20px auto; color: gold; display: flex; align-items: center; justify-content: center; font-size: 21px; box-shadow: 0 15px 50px rgba(255,215,0,0.7);">
        <div style="text-align:center;">
          <strong>LUXE BLACK CARD</strong><br>
          Thabang •••• 4242
        </div>
      </div>
      <button onclick="completePayment()">Confirm Luxury Purchase</button>
    </div>
  </div>

  <div id="successOverlay" class="overlay">
    <div class="success">
      <h2>🎉 Welcome to the Family</h2>
      <p style="color:gold;">You are now a LUXE VIP member.</p>
      <button onclick="location.reload()">Shop Again</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    let scene, camera, renderer, controls;
    let products = [];
    let cartItems = 0;
    let phase = 'intro';
    let keypadMesh;

    function init() {
      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x020202, 25, 110);

      camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 200);
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      // Dramatic celebrity lighting
      scene.add(new THREE.AmbientLight(0xcccccc, 0.9));
      const spot1 = new THREE.SpotLight(0xffdd88, 2, 0, Math.PI/6);
      spot1.position.set(0, 18, 5);
      scene.add(spot1);
      const spot2 = new THREE.SpotLight(0x88ffdd, 1.5, 0, Math.PI/5);
      spot2.position.set(12, 15, 20);
      scene.add(spot2);

      // Large ground + extended Red Carpet
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(150,150), new THREE.MeshStandardMaterial({color:0x0a0a0a}));
      ground.rotation.x = -Math.PI/2;
      scene.add(ground);

      const carpet = new THREE.Mesh(new THREE.PlaneGeometry(8,50), new THREE.MeshStandardMaterial({color:0x990000, emissive: 0x330000}));
      carpet.rotation.x = -Math.PI/2;
      carpet.position.z = 8;
      scene.add(carpet);

      // Improved Mercedes G63 cars
      function createCar(x) {
        const group = new THREE.Group();
        // Body
        const body = new THREE.Mesh(new THREE.BoxGeometry(5.8, 2.6, 2.8), new THREE.MeshStandardMaterial({color:0x111111, metalness:0.98, roughness:0.12}));
        body.position.y = 1.6;
        group.add(body);
        // Windows
        const windowMat = new THREE.MeshStandardMaterial({color:0x112233, metalness:0.9});
        const roof = new THREE.Mesh(new THREE.BoxGeometry(3.8, 1.2, 2.2), windowMat);
        roof.position.set(0, 2.6, 0);
        group.add(roof);
        // Lights
        const lightMat = new THREE.MeshStandardMaterial({color:0xffee99, emissive:0xffaa00});
        const headlight = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.4,0.2), lightMat);
        headlight.position.set(2.6, 1.6, -1.2);
        group.add(headlight);
        group.position.set(x, 0, -22);
        scene.add(group);
      }
      createCar(-12);
      createCar(12);

      // Bigger Stairs
      const stairs = new THREE.Mesh(new THREE.BoxGeometry(12,0.6,28), new THREE.MeshStandardMaterial({color:0x444444}));
      stairs.position.set(0,5,10);
      stairs.rotation.x = -0.18;
      scene.add(stairs);

      // Large Building / Store
      const wallMat = new THREE.MeshStandardMaterial({color:0x222222, metalness:0.6});
      const leftWall = new THREE.Mesh(new THREE.BoxGeometry(2,18,45), wallMat);
      leftWall.position.set(-9,9,22);
      scene.add(leftWall);
      const rightWall = leftWall.clone();
      rightWall.position.x = 9;
      scene.add(rightWall);

      // Door area
      const door = new THREE.Mesh(new THREE.BoxGeometry(6,10,0.6), new THREE.MeshStandardMaterial({color:0x111111, metalness:0.95}));
      door.position.set(0,6,4);
      scene.add(door);
      window.doorMesh = door;

      // Interactive Keypad (box on the right wall)
      keypadMesh = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 1.8, 0.2),
        new THREE.MeshStandardMaterial({color:0x333333, emissive:0x222222})
      );
      keypadMesh.position.set(7.5, 6, 4);
      keypadMesh.userData = {isKeypad: true};
      scene.add(keypadMesh);

      // More spacious products
      function createProduct(x, z, color, name, price) {
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(2.2, 2.2, 2.2),
          new THREE.MeshStandardMaterial({color: color, metalness: 0.92, roughness: 0.08})
        );
        mesh.position.set(x, 3.5, z);
        mesh.userData = {name: name, price: price};
        scene.add(mesh);
        products.push(mesh);
      }

      createProduct(-6, 28, 0x00ccff, "Luxe Chronograph", "R45,000");
      createProduct(0, 27, 0xff1133, "Signature Boost Sneakers", "R28,500");
      createProduct(7, 29, 0x11ff88, "Cashmere Overcoat", "R68,000");
      createProduct(-4, 36, 0xffdd00, "Limited Alligator Bag", "R95,000");
      createProduct(5, 35, 0x9966ff, "Bespoke Sunglasses", "R19,900");

      camera.position.set(0, 12, -38);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.1;
      controls.minDistance = 5;
      controls.maxDistance = 80;

      startCinematic();
      animate();
    }

    function startCinematic() {
      let t = 0;
      const start = Date.now();
      function move() {
        t = (Date.now() - start) / 8000;
        camera.position.z = -38 + t * 48;
        camera.position.y = 12 + Math.sin(t*2)*4;
        camera.lookAt(0, 7, 12);
        if (t < 1) requestAnimationFrame(move);
        else document.getElementById('passcodeOverlay').style.display = 'flex';
      }
      move();
    }

    window.checkCode = function() {
      if (document.getElementById('codeInput').value.length >= 3) {
        document.getElementById('passcodeOverlay').style.display = 'none';
        document.getElementById('keypadOverlay').style.display = 'none';
      }
    };

    // Click handler for keypad & products
    window.addEventListener('click', (e) => {
      if (phase !== 'inside' && phase !== 'intro') return;

      const mouse = new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
      );
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(products.concat(keypadMesh ? [keypadMesh] : []));

      if (hits.length > 0) {
        const obj = hits[0].object;
        if (obj.userData.isKeypad) {
          document.getElementById('keypadOverlay').style.display = 'flex';
          document.getElementById('keypadInput').focus();
        } else {
          // Product click
          const item = obj.userData;
          cartItems++;
          document.getElementById('cartCount').textContent = cartItems;
          const box = document.getElementById('infoBox');
          box.innerHTML = `<strong>\( {item.name}</strong><br>Price: R \){item.price}`;
          box.style.display = 'block';
          setTimeout(() => box.style.display = 'none', 2500);
        }
      }
    });

    window.submitKeypad = function() {
      const input = document.getElementById('keypadInput').value;
      const status = document.getElementById('keypadStatus');
      
      if (input === "2000") {
        status.style.color = "#00ff88";
        status.textContent = "ACCESS GRANTED";
        setTimeout(() => {
          document.getElementById('keypadOverlay').style.display = 'none';
          // Open doors
          window.doorMesh.position.x = -4;
          setTimeout(() => { window.doorMesh.position.x = 4; }, 800);
          
          phase = 'inside';
          document.getElementById('cart').style.display = 'block';
          controls.target.set(0, 5, 32);
          camera.position.set(12, 12, 45);
        }, 800);
      } else {
        status.textContent = "INVALID CODE";
        setTimeout(() => { status.textContent = ""; }, 1500);
      }
    };

    window.showPayment = function() { /* same as before */ 
      if (cartItems === 0) return alert("Add items first");
      document.getElementById('paymentOverlay').style.display = 'flex';
    };

    window.completePayment = function() {
      const card = document.getElementById('cardAnimation');
      card.style.transition = 'transform 1.6s';
      card.style.transform = 'scale(1.25) rotate(10deg)';
      setTimeout(() => {
        document.getElementById('paymentOverlay').style.display = 'none';
        document.getElementById('successOverlay').style.display = 'flex';
      }, 1600);
    };

    function animate() {
      requestAnimationFrame(animate);
      if (controls) controls.update();
      products.forEach(p => p.rotation.y += 0.006);
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
