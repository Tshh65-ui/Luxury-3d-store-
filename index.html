<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LUXE VIP Store</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #loading { position: absolute; top: 50%; left: 50%; color: gold; font-size: 24px; transform: translate(-50%, -50%); z-index: 1000; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 300; }
  </style>
</head>
<body>
  <div id="loading">Loading VIP Experience...</div>

  <!-- Keypad Overlay -->
  <div id="keypadOverlay" class="overlay" style="display: flex;">
    <div style="background:#111; color:white; padding:40px; border-radius:20px; text-align:center; box-shadow:0 0 40px gold;">
      <h2>🔐 VIP ENTRANCE</h2>
      <p>Enter Code</p>
      <input id="keyInput" type="text" maxlength="4" placeholder="2000" style="font-size:32px; width:180px; text-align:center; padding:10px;">
      <br><br>
      <button onclick="submitCode()" style="padding:15px 40px; font-size:18px; background:#c00; color:white; border:none; border-radius:10px;">UNLOCK</button>
      <div id="status" style="color:#ff4444; margin-top:15px; font-weight:bold; min-height:24px;"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    let scene, camera, renderer, controls;
    let products = [];
    let doorMesh;
    let phase = 'intro';

    function init() {
      document.getElementById('loading').style.display = 'none';

      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x222222, 20, 150);

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // Very bright lighting
      scene.add(new THREE.AmbientLight(0xffffff, 1.4));
      const sun = new THREE.DirectionalLight(0xffffff, 2);
      sun.position.set(20, 40, 30);
      scene.add(sun);

      // Ground
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(200,200), new THREE.MeshStandardMaterial({color: 0x333333}));
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      // Red Carpet
      const carpet = new THREE.Mesh(new THREE.PlaneGeometry(10, 70), new THREE.MeshStandardMaterial({color: 0xcc0000}));
      carpet.rotation.x = -Math.PI / 2;
      carpet.position.z = 20;
      scene.add(carpet);

      // Two Black Mercedes G63 (Simple but visible)
      function createCar(x) {
        const car = new THREE.Mesh(new THREE.BoxGeometry(6.5, 3, 3.2), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.95, roughness: 0.2}));
        car.position.set(x, 1.8, -28);
        scene.add(car);
      }
      createCar(-14);
      createCar(14);

      // Big Stairs
      const stairs = new THREE.Mesh(new THREE.BoxGeometry(14, 1.2, 35), new THREE.MeshStandardMaterial({color: 0x555555}));
      stairs.position.set(0, 7, 15);
      stairs.rotation.x = -0.18;
      scene.add(stairs);

      // Door
      doorMesh = new THREE.Mesh(new THREE.BoxGeometry(7, 12, 0.8), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.9}));
      doorMesh.position.set(0, 8, 6);
      scene.add(doorMesh);

      // Products inside (Bright colors)
      function addProduct(x, z, color, name) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), new THREE.MeshStandardMaterial({color: color, metalness: 0.85}));
        p.position.set(x, 5, z);
        p.userData = {name};
        scene.add(p);
        products.push(p);
      }
      addProduct(-8, 35, 0x00aaff, "Luxe Watch");
      addProduct(0, 34, 0xff2222, "Signature Sneakers");
      addProduct(8, 36, 0x22ff88, "Cashmere Coat");
      addProduct(0, 48, 0xffdd00, "VIP Bag");

      camera.position.set(0, 18, -55);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      startCinematic();
      animate();
    }

    function startCinematic() {
      let progress = 0;
      const startTime = Date.now();
      function move() {
        progress = Math.min((Date.now() - startTime) / 9000, 1);
        camera.position.z = -55 + progress * 68;
        camera.position.y = 18 + Math.sin(progress * 2) * 6;
        camera.lookAt(0, 9, 20);
        if (progress < 1) requestAnimationFrame(move);
      }
      move();
    }

    window.submitCode = function() {
      const code = document.getElementById('keyInput').value.trim();
      const status = document.getElementById('status');

      if (code === "2000") {
        status.style.color = "#00ff88";
        status.textContent = "ACCESS GRANTED ✓";
        setTimeout(() => {
          document.getElementById('keypadOverlay').style.display = 'none';
          // Open doors
          doorMesh.position.x = -6;
          setTimeout(() => doorMesh.position.x = 6, 1200);
          phase = 'inside';
        }, 800);
      } else {
        status.textContent = "INVALID CODE - Try 2000";
        setTimeout(() => status.textContent = "", 2000);
      }
    };

    function animate() {
      requestAnimationFrame(animate);
      if (controls) controls.update();
      products.forEach(p => p.rotation.y += 0.008);
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Click on products
    window.addEventListener('click', (e) => {
      if (phase !== 'inside') return;
      const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(products);
      if (hits.length > 0) {
        alert("Added " + hits[0].object.userData.name + " to your VIP Wishlist ✨");
      }
    });

    init();
  </script>
</body>
</html>
