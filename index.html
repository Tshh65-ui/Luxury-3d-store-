<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LUXE VIP Store</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #loading { position: absolute; top: 50%; left: 50%; color: gold; font-size: 24px; transform: translate(-50%, -50%); z-index: 1000; }
    #levelDisplay { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.85); color: gold; padding: 12px 20px; border-radius: 12px; font-size: 17px; border: 2px solid gold; z-index: 200; }
  </style>
</head>
<body>
  <div id="loading">Loading Luxury Store...</div>
  <div id="levelDisplay">VIP LEVEL <span id="level">1</span></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    let scene, camera, renderer, controls, doorMesh, keypadMesh;
    let vipLevel = 1;
    let productsAdded = 0;
    let phase = 'intro';

    function updateLevel() {
      document.getElementById('level').textContent = vipLevel;
    }

    function init() {
      document.getElementById('loading').style.display = 'none';
      updateLevel();

      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x111111, 30, 180);

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 250);
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 1.4));
      const sun = new THREE.DirectionalLight(0xffffff, 2.4);
      sun.position.set(30, 50, 40);
      scene.add(sun);

      // Solid Ground
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(300,300), new THREE.MeshStandardMaterial({color: 0x222222}));
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      // Red Carpet
      const carpet = new THREE.Mesh(new THREE.PlaneGeometry(9, 52), new THREE.MeshStandardMaterial({color: 0xcc0000}));
      carpet.rotation.x = -Math.PI / 2;
      carpet.position.set(0, 0.05, 26);
      scene.add(carpet);

      // Real G-Wagons facing each other
      const loader = new THREE.GLTFLoader();
      
      loader.load('g63.glb', (gltf) => {
        // Left Car - facing right
        const car1 = gltf.scene.clone();
        car1.position.set(-16, 0, -32);
        car1.scale.set(2.2, 2.2, 2.2);
        car1.rotation.y = Math.PI / 2;        // Facing right
        scene.add(car1);

        // Right Car - facing left
        const car2 = gltf.scene.clone();
        car2.position.set(16, 0, -32);
        car2.scale.set(2.2, 2.2, 2.2);
        car2.rotation.y = -Math.PI / 2;       // Facing left
        scene.add(car2);
      });

      // Load 3D Keypad Model
      loader.load('keypad.glb', (gltf) => {
        keypadMesh = gltf.scene.clone();
        keypadMesh.position.set(9, 7, 12);     // Next to the door
        keypadMesh.scale.set(1.5, 1.5, 1.5);
        keypadMesh.rotation.y = Math.PI / 2;
        scene.add(keypadMesh);
      });

      // Stairs + Walls + Door (same as before)
      const stairs = new THREE.Mesh(new THREE.BoxGeometry(16, 1.5, 45), new THREE.MeshStandardMaterial({color: 0x444444}));
      stairs.position.set(0, 8, 20);
      stairs.rotation.x = -0.22;
      scene.add(stairs);

      doorMesh = new THREE.Mesh(new THREE.BoxGeometry(8, 14, 1), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.95}));
      doorMesh.position.set(0, 10, 12);
      scene.add(doorMesh);

      camera.position.set(0, 8, -45);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.minDistance = 5;
      controls.maxDistance = 120;
      controls.minPolarAngle = Math.PI * 0.1;
      controls.maxPolarAngle = Math.PI * 0.85;

      startCinematic();
      animate();
    }

    function startCinematic() {
      let progress = 0;
      const startTime = Date.now();
      function move() {
        progress = Math.min((Date.now() - startTime) / 14000, 1);
        if (progress < 0.4) {
          camera.position.z = -45 + progress * 40;
        } else if (progress < 0.7) {
          camera.position.set(0, 12, -20 + (progress-0.4)*55);
        } else {
          camera.position.set(5, 14, 18);
          camera.lookAt(0, 11, 20);
        }
        if (progress < 1) requestAnimationFrame(move);
      }
      move();
    }

    function animate() {
      requestAnimationFrame(animate);
      if (controls) controls.update();
      renderer.render(scene, camera);
    }

    // Click on 3D keypad or products
    window.addEventListener('click', (e) => {
      if (phase !== 'inside' && phase !== 'intro') return;
      
      const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(scene.children, true);

      if (hits.length > 0) {
        const obj = hits[0].object;
        if (keypadMesh && obj === keypadMesh || hits.some(h => h.object === keypadMesh)) {
          alert("🔐 Enter code: 2000");
        } else {
          // Product click
          productsAdded++;
          if (productsAdded % 2 === 0 && vipLevel < 10) {
            vipLevel++;
            document.getElementById('level').textContent = vipLevel;
            alert(`🎉 VIP Level Up! Now Level ${vipLevel}`);
          } else {
            alert("Added to VIP Wishlist ✨");
          }
        }
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
