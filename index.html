<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LUXE VIP Store</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    canvas { display: block; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: gold; font-size: 20px; z-index: 1000; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; align-items: center; justify-content: center; z-index: 300; }
    .passcode, .keypadOverlay { background: rgba(0,0,0,0.95); color: #fff; padding: 35px; border-radius: 16px; text-align: center; pointer-events: all; box-shadow: 0 0 50px rgba(255,215,0,0.6); }
    input { font-size: 28px; padding: 12px; width: 200px; text-align: center; margin: 15px 0; }
    button { padding: 14px 32px; font-size: 17px; background: #c00; color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="loading">Loading Luxury Experience...</div>

  <!-- Keypad Overlay -->
  <div id="keypadOverlay" class="overlay">
    <div class="keypadOverlay">
      <h2>🔐 VIP ENTRANCE</h2>
      <input type="text" id="keypadInput" maxlength="4" placeholder="2000">
      <br><button onclick="submitKeypad()">UNLOCK DOOR</button>
      <div id="keypadStatus" style="color:#ff4444; margin-top:10px; font-weight:bold;"></div>
    </div>
  </div>

  <div id="cart" style="position:absolute; bottom:20px; right:20px; background:rgba(0,0,0,0.8); color:gold; padding:12px 24px; border-radius:10px; display:none;">
    Wishlist: <span id="cartCount">0</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    let scene, camera, renderer, controls, products = [], doorMesh, keypadMesh;
    let cartItems = 0;
    let phase = 'intro';

    function init() {
      document.getElementById('loading').style.display = 'none';

      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x010101, 20, 120);

      camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 200);
      renderer = new THREE.WebGLRenderer({antialias:true});
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // Lights
      scene.add(new THREE.AmbientLight(0xaaaaaa, 1));
      const spot = new THREE.SpotLight(0xffeeaa, 3, 100, Math.PI/5);
      spot.position.set(0, 25, 10);
      scene.add(spot);

      // Ground + Carpet
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(200,200), new THREE.MeshStandardMaterial({color:0x111111}));
      ground.rotation.x = -Math.PI/2;
      scene.add(ground);

      const carpet = new THREE.Mesh(new THREE.PlaneGeometry(9,55), new THREE.MeshStandardMaterial({color:0x990000}));
      carpet.rotation.x = -Math.PI/2;
      carpet.position.z = 10;
      scene.add(carpet);

      // Cars (Improved)
      function createCar(x) {
        const car = new THREE.Mesh(new THREE.BoxGeometry(6,2.8,2.9), new THREE.MeshStandardMaterial({color:0x111111, metalness:0.98}));
        car.position.set(x, 1.6, -25);
        scene.add(car);
      }
      createCar(-13); createCar(13);

      // Stairs & Door
      const stairs = new THREE.Mesh(new THREE.BoxGeometry(13,0.8,30), new THREE.MeshStandardMaterial({color:0x444444}));
      stairs.position.set(0,6,12);
      stairs.rotation.x = -0.2;
      scene.add(stairs);

      doorMesh = new THREE.Mesh(new THREE.BoxGeometry(6.5,11,0.6), new THREE.MeshStandardMaterial({color:0x111111, metalness:0.95}));
      doorMesh.position.set(0,7,5);
      scene.add(doorMesh);

      // Keypad
      keypadMesh = new THREE.Mesh(new THREE.BoxGeometry(1.4,2,0.3), new THREE.MeshStandardMaterial({color:0x222222, emissive:0x111111}));
      keypadMesh.position.set(8, 7, 5);
      keypadMesh.userData = {isKeypad: true};
      scene.add(keypadMesh);

      // Products (bigger & rotating faster)
      function addProduct(x,z,color,name) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(2.4,2.4,2.4), new THREE.MeshStandardMaterial({color, metalness:0.9}));
        p.position.set(x,4,z);
        p.userData = {name};
        scene.add(p);
        products.push(p);
      }
      addProduct(-7,30,0x00ddff,"Luxe Watch");
      addProduct(0,29,0xff2244,"Signature Sneakers");
      addProduct(7,31,0x22ff99,"Cashmere Coat");
      addProduct(0,40,0xffee00,"VIP Bag");

      camera.position.set(0,15,-45);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      startCinematic();
      animate();
    }

    function startCinematic() {
      let progress = 0;
      const startTime = Date.now();
      function moveCam() {
        progress = (Date.now() - startTime) / 9000; // 9 seconds
        camera.position.z = -45 + progress * 58;
        camera.position.y = 15 + Math.sin(progress*Math.PI)*6;
        camera.lookAt(0, 8, 15);
        if (progress < 1) requestAnimationFrame(moveCam);
        else document.getElementById('keypadOverlay').style.display = 'flex';
      }
      moveCam();
    }

    window.submitKeypad = function() {
      const code = document.getElementById('keypadInput').value;
      if (code === "2000") {
        document.getElementById('keypadOverlay').style.display = 'none';
        doorMesh.position.x = -5;
        setTimeout(() => doorMesh.position.x = 5, 900);
        
        setTimeout(() => {
          phase = 'inside';
          document.getElementById('cart').style.display = 'block';
        }, 1200);
      } else {
        document.getElementById('keypadStatus').textContent = "INVALID CODE — TRY 2000";
        setTimeout(() => document.getElementById('keypadStatus').textContent = "", 2000);
      }
    };

    function animate() {
      requestAnimationFrame(animate);
      if (controls) controls.update();
      products.forEach(p => p.rotation.y += 0.012); // Faster rotation
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Click products
    window.addEventListener('click', (e) => {
      if (phase !== 'inside') return;
      // ... (raycasting code remains similar)
      const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
      const ray = new THREE.Raycaster();
      ray.setFromCamera(mouse, camera);
      const hit = ray.intersectObjects(products)[0];
      if (hit) {
        alert("Added " + hit.object.userData.name + " to wishlist ✨");
      }
    });

    init();
  </script>
</body>
</html>
